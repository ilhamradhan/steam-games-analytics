appearance:
  default: system
  switcher: true

deployment:
  basePath: /steam-games-analytics
title: Steam Games Analytics
description: Comprehensive analytics dashboard for Steam gaming marketplace insights

theme:
  colorPalettes:
    default:
      light:
        - "#0f172a"
        - "#1e40af"
        - "#3b82f6"
        - "#06b6d4"
        - "#10b981"
        - "#f59e0b"
        - "#ef4444"
        - "#8b5cf6"
        - "#ec4899"
        - "#14b8a6"
      dark:
        - "#e0e7ff"
        - "#60a5fa"
        - "#38bdf8"
        - "#06b6d4"
        - "#34d399"
        - "#fbbf24"
        - "#f87171"
        - "#a78bfa"
        - "#f472b6"
        - "#2dd4bf"
  colorScales:
    default:
      light:
        - "#dbeafe"
        - "#1e40af"
      dark:
        - "#0c4a6e"
        - "#38bdf8"
  colors:
    primary:
      light: "#1e40af"
      dark: "#60a5fa"
    accent:
      light: "#dc2626"
      dark: "#fca5a5"
    base:
      light: "#ffffff"
      dark: "#0f172a"
    info:
      light: "#0284c7"
      dark: "#06b6d4"
    positive:
      light: "#16a34a"
      dark: "#4ade80"
    warning:
      light: "#f8c900"
      dark: "#fbbf24"
    negative:
      light: "#dc2626"
      dark: "#f87171"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
