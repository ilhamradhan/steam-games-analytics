appearance:
  default: dark
  switcher: true

deployment:
  basePath: /steam-games-analytics
title: Steam Games Analytics
description: Comprehensive analytics dashboard for Steam gaming marketplace insights

theme:
  colorPalettes:
    default:
      light:
        - "#4c4f69"
        - "#7287fd"
        - "#179299"
        - "#8839ef"
        - "#40a02b"
        - "#df8e1d"
        - "#d20f39"
        - "#ea76cb"
        - "#1e66f5"
        - "#fe640b"
      dark:
        - "#cad3f5"
        - "#8aadf4"
        - "#8bd5ca"
        - "#c6a0f6"
        - "#a6da95"
        - "#eed49f"
        - "#ed8796"
        - "#f5bde6"
        - "#91d7e3"
        - "#f5a97f"
  colorScales:
    default:
      light:
        - "#ccd0da"
        - "#7287fd"
      dark:
        - "#363a4f"
        - "#8aadf4"
  colors:
    primary:
      light: "#7287fd"
      dark: "#8aadf4"
    accent:
      light: "#8839ef"
      dark: "#c6a0f6"
    base:
      light: "#eff1f5"
      dark: "#24273a"
    info:
      light: "#1e66f5"
      dark: "#91d7e3"
    positive:
      light: "#40a02b"
      dark: "#a6da95"
    warning:
      light: "#df8e1d"
      dark: "#eed49f"
    negative:
      light: "#d20f39"
      dark: "#ed8796"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
